<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Photo Sphere Viewer & Plugins CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core/index.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/markers-plugin/index.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/gallery-plugin/index.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/compass-plugin/index.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/virtual-tour-plugin/index.min.css"
    />
    <!-- Leaflet & Plan Plugin CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/plan-plugin/index.min.css"
    />

    <style type="text/tailwindcss">
      /* --- CUSTOM TOOLTIP STYLES --- */
      .tooltip-video-modern {
        @apply bg-transparent shadow-none border-none p-0 w-[360px] md:w-[560px] !max-w-[90vw] pointer-events-auto z-[10000] !important;
        /* Hapus transform dan opacity default PSV */
        transform: none !important;
        opacity: 1 !important;
      }

      .tooltip-video-modern .psv-tooltip-content {
        @apply p-0 bg-slate-900/95 backdrop-blur-md rounded-xl border border-white/15 overflow-hidden shadow-[0_10px_40px_rgba(0,0,0,0.6)];
      }

      /* Perbaiki posisi arrow */
      .tooltip-video-modern .psv-tooltip-arrow {
        @apply border-t-slate-900/95 !important;
        width: 16px !important;
        height: 8px !important;
        margin-bottom: -1px !important; /* Hilangkan gap kecil */
      }

      /* Hover Animasi Custom Marker */
      .marker-video-thumb {
        @apply transition-all duration-300 ease-[cubic-bezier(0.25,0.46,0.45,0.94)];
      }
      .marker-video-thumb:hover {
        @apply scale-105 -translate-y-1 border-red-500;
      }

      /* Pastikan marker PSV bisa diklik proper */
      .psv-marker {
        cursor: pointer !important;
        z-index: 1000 !important;
      }

      /* Pastikan tooltip container tidak ada margin/padding ekstra */
      .psv-tooltip {
        @apply m-0 p-0 !important;
      }
    </style>

    <title>Virtual Tour</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {};
    </script>
  </head>
  <body
    class="bg-slate-50 min-h-screen flex items-center justify-center font-sans antialiased text-slate-800"
  >
    <!-- the viewer container must have a defined size -->
    <div id="viewer" style="width: 100vw; height: 100vh"></div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three/build/three.module.js",
          "@photo-sphere-viewer/core": "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core/index.module.js",
          "@photo-sphere-viewer/markers-plugin": "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/markers-plugin/index.module.js",
          "@photo-sphere-viewer/gallery-plugin": "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/gallery-plugin/index.module.js",
          "@photo-sphere-viewer/compass-plugin": "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/compass-plugin/index.module.js",
          "@photo-sphere-viewer/virtual-tour-plugin": "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/virtual-tour-plugin/index.module.js",
          "leaflet": "https://unpkg.com/leaflet@1.9.4/dist/leaflet-src.esm.js",
          "@photo-sphere-viewer/plan-plugin": "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/plan-plugin/index.module.js"
        }
      }
    </script>

    <script type="module">
      import { Viewer } from "@photo-sphere-viewer/core";
      import { MarkersPlugin } from "@photo-sphere-viewer/markers-plugin";
      import { GalleryPlugin } from "@photo-sphere-viewer/gallery-plugin";
      import { CompassPlugin } from "@photo-sphere-viewer/compass-plugin";
      import { VirtualTourPlugin } from "@photo-sphere-viewer/virtual-tour-plugin";
      import { PlanPlugin } from "@photo-sphere-viewer/plan-plugin";

      // Fungsi untuk membuat konten tooltip video
      function createVideoTooltipContent() {
        return `
          <iframe
            class="w-full h-[380px] rounded-t-xl border-none block bg-black"
            src="https://www.youtube.com/embed/bMknfKXIFA8?autoplay=1&modestbranding=1&rel=0&enablejsapi=1"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen
            id="video-iframe-${Date.now()}"
          ></iframe>
          <div class="p-4 text-white">
            <h3 class="m-0 mb-1 text-base font-semibold text-slate-50 flex justify-between items-center">
              Faktor K3 Bengkel
              <span class="text-xl text-slate-400 cursor-pointer p-1 hover:text-slate-50 transition-colors leading-none" onclick="window.closeVideoTooltip()">&times;</span>
            </h3>
            <p class="m-0 text-[13px] text-slate-400 leading-relaxed">Video Pengenalan Standar Keselamatan dan Kesehatan Kerja di Laboratorium Mesin Utama.</p>
          </div>
        `;
      }

      const viewer = new Viewer({
        container: document.querySelector("#viewer"),
        defaultYaw: "130deg",
        plugins: [
          // 1. Compass Plugin
          [
            CompassPlugin,
            {
              hotspots: [
                { yaw: "0deg" },
                { yaw: "90deg" },
                { yaw: "180deg" },
                { yaw: "270deg" },
              ],
            },
          ],
          // 2. Markers Plugin
          [
            MarkersPlugin,
            {
              markers: [],
            },
          ],
          // 3. Gallery Plugin
          [
            GalleryPlugin,
            {
              visibleOnLoad: false,
              hideOnClick: false,
            },
          ],
          // 4. Plan Plugin
          [
            PlanPlugin,
            {
              coordinates: [114.306778, -8.293812],
              bearing: "130deg",
              defaultZoom: 18,
            },
          ],
          // 5. Virtual Tour Plugin
          [
            VirtualTourPlugin,
            {
              positionMode: "manual",
              renderMode: "3d",
            },
          ],
        ],
      });

      // Konfigurasi node untuk Virtual Tour Plugin
      const virtualTour = viewer.getPlugin(VirtualTourPlugin);

      virtualTour.setNodes(
        [
          {
            id: "node-1",
            panorama: "images/2.jpg",
            thumbnail: "images/2.jpg",
            name: "Ruangan Mesin",
            gps: [114.306778, -8.293812],
            markers: [
              // Marker Gedung dengan Panel Popup
              {
                id: "marker-gedung-mesin",
                position: { yaw: "85deg", pitch: "5deg" },
                html: "🏢 Gedung Lab Mesin",
                style: {
                  color: "white",
                  fontSize: "14px",
                  fontFamily: "sans-serif",
                  textAlign: "center",
                  backgroundColor: "rgba(0,0,0,0.6)",
                  padding: "6px 12px",
                  borderRadius: "8px",
                  border: "1px solid white",
                  cursor: "pointer",
                },
                tooltip: "Lihat Info Gedung Lab Mesin",
                content: `
                  <div class="p-4" style="min-width: 300px;">
                    <h3 class="font-bold text-xl mb-2 text-slate-100">Gedung Lab Mesin</h3>
                    <p class="text-sm text-slate-200 mb-4">Informasi mengenai fasilitas dan kegiatan di Laboratorium Mesin.</p>
                  </div>
                `,
              },

              // Marker Video Interaktif via Custom Tooltip
              {
                id: "marker-video-popup",
                position: { yaw: "85deg", pitch: "10deg" },
                html: `
                  <div class="marker-video-thumb w-[148px] bg-slate-900/90 border-2 border-white/80 rounded-lg p-1 shadow-[0_6px_16px_rgba(0,0,0,0.5)] text-center relative overflow-hidden select-none">

                    <div class="text-[11px] font-semibold text-white mt-[6px] mb-[2px] flex justify-center items-center gap-1 font-sans">
                      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"></path><circle cx="12" cy="13" r="3"></circle></svg>
                      Video Pengenalan K3
                    </div>
                  </div>
                `,
                size: { width: 148, height: 110 },
                anchor: "bottom center",

                // Konfigurasi Tooltip yang DIPERBAIKI
                tooltip: {
                  content: createVideoTooltipContent(),
                  className: "tooltip-video-modern",
                  position: "top",
                  trigger: "click",
                  offset: "10px",
                },
              },
            ],
            links: [
              { nodeId: "node-2", position: { yaw: "0deg", pitch: "0deg" } },
            ],
          },
          {
            id: "node-2",
            panorama: "images/3.jpg",
            thumbnail: "images/3.jpg",
            name: "Jalan Antara Lab Mesin dan Infomatika",
            links: [
              { nodeId: "node-1", position: { yaw: "180deg", pitch: "0deg" } },
              { nodeId: "node-3", position: { yaw: "0deg", pitch: "0deg" } },
            ],
          },
          {
            id: "node-3",
            panorama: "images/4.jpg",
            thumbnail: "images/4.jpg",
            name: "Jalan Antara Lab Mesin dan Infomatika",
            links: [
              { nodeId: "node-2", position: { yaw: "180deg", pitch: "0deg" } },
              { nodeId: "node-4", position: { yaw: "0deg", pitch: "0deg" } },
            ],
          },
          {
            id: "node-4",
            panorama: "images/5.jpg",
            thumbnail: "images/5.jpg",
            name: "Jalan Depan Lab Informatika",
            links: [
              { nodeId: "node-3", position: { yaw: "180deg", pitch: "0deg" } },
              { nodeId: "node-5", position: { yaw: "0deg", pitch: "0deg" } },
            ],
          },
          {
            id: "node-5",
            panorama: "images/6.jpg",
            thumbnail: "images/6.jpg",
            name: "Jalan Depan Lab Informatika",
            links: [
              { nodeId: "node-4", position: { yaw: "180deg", pitch: "0deg" } },
              { nodeId: "node-6", position: { yaw: "0deg", pitch: "0deg" } },
            ],
          },
          {
            id: "node-6",
            panorama: "images/7.jpg",
            thumbnail: "images/7.jpg",
            name: "Jalan Depan Lab Informatika",
            links: [
              { nodeId: "node-5", position: { yaw: "180deg", pitch: "0deg" } },
              { nodeId: "node-7", position: { yaw: "0deg", pitch: "0deg" } },
            ],
          },
          {
            id: "node-7",
            panorama: "images/8.jpg",
            thumbnail: "images/8.jpg",
            name: "Jalan Depan Lab Informatika",
            links: [
              { nodeId: "node-6", position: { yaw: "180deg", pitch: "0deg" } },
              { nodeId: "node-8", position: { yaw: "0deg", pitch: "0deg" } },
            ],
          },
          {
            id: "node-8",
            panorama: "images/9.jpg",
            thumbnail: "images/9.jpg",
            name: "Area Parkir atau Jalan Utama",
            links: [
              { nodeId: "node-7", position: { yaw: "180deg", pitch: "0deg" } },
              { nodeId: "node-9", position: { yaw: "0deg", pitch: "0deg" } },
            ],
          },
          {
            id: "node-9",
            panorama: "images/10.jpg",
            thumbnail: "images/10.jpg",
            name: "Area Parkir atau Jalan Utama",
            links: [
              { nodeId: "node-8", position: { yaw: "180deg", pitch: "0deg" } },
              { nodeId: "node-10", position: { yaw: "0deg", pitch: "0deg" } },
            ],
          },
          {
            id: "node-10",
            panorama: "images/11.jpg",
            thumbnail: "images/11.jpg",
            name: "Area Parkir atau Jalan Utama",
            links: [
              { nodeId: "node-9", position: { yaw: "180deg", pitch: "0deg" } },
              { nodeId: "node-11", position: { yaw: "0deg", pitch: "0deg" } },
            ],
          },
          {
            id: "node-11",
            panorama: "images/12.jpg",
            thumbnail: "images/12.jpg",
            name: "Area Parkir atau Jalan Utama",
            links: [
              { nodeId: "node-10", position: { yaw: "180deg", pitch: "0deg" } },
              { nodeId: "node-12", position: { yaw: "0deg", pitch: "0deg" } },
            ],
          },
          {
            id: "node-12",
            panorama: "images/13.jpg",
            thumbnail: "images/13.jpg",
            name: "Area Parkir atau Jalan Utama",
            links: [
              { nodeId: "node-11", position: { yaw: "180deg", pitch: "0deg" } },
            ],
          },
        ],
        "node-1",
      );

      // Dapatkan plugin markers
      const markersPlugin = viewer.getPlugin(MarkersPlugin);

      // Fungsi global untuk menutup tooltip dipindah ke sini agar bisa membaca variabel markersPlugin
      window.closeVideoTooltip = function () {
        if (markersPlugin) {
          markersPlugin.hideMarkerTooltip("marker-video-popup");
        }
      };

      // --- DEBUG LOGGING ---
      const debugPanel = document.getElementById("debug-panel");
      const tooltipState = document.getElementById("tooltip-state");
      const markerId = document.getElementById("marker-id");

      // Tampilkan debug panel (hapus komentar jika ingin debug)
      // debugPanel.style.display = 'block';

      // Event listener untuk show tooltip
      markersPlugin.addEventListener("show-tooltip", (e) => {
        console.log("✅ Tooltip shown:", e.marker.id);
        if (debugPanel) {
          tooltipState.textContent = "visible";
          markerId.textContent = e.marker.id;
        }

        const iframe = document.querySelector(".tooltip-video-modern iframe");
        if (iframe) {
          // Kita gunakan command resmi YouTube Iframe API untuk me-reset / restart video
          iframe.contentWindow.postMessage(
            '{"event":"command","func":"seekTo","args":[0, true]}',
            "*",
          );
          iframe.contentWindow.postMessage(
            '{"event":"command","func":"playVideo","args":""}',
            "*",
          );
        }
      });

      // Event listener untuk hide tooltip
      markersPlugin.addEventListener("hide-tooltip", (e) => {
        console.log("❌ Tooltip hidden:", e.marker.id);
        if (debugPanel) {
          tooltipState.textContent = "hidden";
          markerId.textContent = e.marker.id || "-";
        }

        // Stop video dengan mengganti src
        if (e.marker.id === "marker-video-popup") {
          const iframe = document.querySelector(".tooltip-video-modern iframe");
          if (iframe) {
            // Mainkan command Pause lewat YouTube API agar video tidak jalan di belakang
            iframe.contentWindow.postMessage(
              '{"event":"command","func":"pauseVideo","args":""}',
              "*",
            );
          }
        }
      });

      // Event listener untuk click pada marker
      markersPlugin.addEventListener("select-marker", (e) => {
        console.log("🎯 Marker clicked:", e.marker.id);
      });

      // Animasi kamera ke marker saat pertama load
      viewer.addEventListener(
        "ready",
        () => {
          console.log("✅ Viewer ready");
          viewer.animate({
            yaw: "85deg",
            pitch: "10deg",
            speed: 700,
          });
        },
        { once: true },
      );

      // Handle window resize untuk memastikan tooltip posisinya benar
      let resizeTimeout;
      window.addEventListener("resize", () => {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(() => {
          console.log("📐 Window resized, repositioning tooltips");
          // Kita tidak perlu memanggil error method hideMarkerTooltip
          document.querySelector(".psv-canvas-container").click();
        }, 250);
      });
    </script>
  </body>
</html>
